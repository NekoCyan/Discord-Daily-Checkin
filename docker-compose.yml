services:
  worker:
    build:
      context: .
      target: runner
    env_file:
      - .env.production
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: on-failure
    depends_on:
      mongo:
        condition: service_healthy
  mongo:
    image: mongo:8
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "27018:27017" # prevent conflict with local MongoDB
    volumes:
      - ./data/mongo:/data/db # store data in project workspace
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 3650d # ← effectively never re-runs (10 years)
      timeout: 5s
      retries: 5
      start_period: 10s # ← give mongo time to boot before first check
