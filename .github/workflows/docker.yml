name: Docker

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  validate-compose:
    name: Validate — ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: build-and-push

    strategy:
      matrix:
        include:
          - name: Standalone (external MongoDB)
            args: -f docker-compose.yml
          - name: With bundled MongoDB
            args: -f docker-compose.yml -f docker-compose.mongo.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create stub .env.production for validation
        run: cp .env.example .env.production

      - name: Validate compose configuration
        run: docker compose ${{ matrix.args }} config --quiet
